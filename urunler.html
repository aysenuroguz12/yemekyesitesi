<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ürünler</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar">
        <a href="index.html">Anasayfa</a>
        <a href="urunler.html">Ürünler</a>
        <a href="sepet.html">Sepetim</a>
        <a href="iletisim.html">İletişim</a>
    </nav>

    <div class="container">

        <h1>Ürünlerimiz</h1>

        <main class="urun-listesi">

            <section class="urun-karti">
                <img src="resimler/1.jpg" alt="Makarna">
                <h3>Makarna</h3>
                <p>50 TL</p>
                <button class="sepete-ekle" data-isim="Makarna" data-fiyat="50">Sepete Ekle</button>
            </section>

            <section class="urun-karti">
                <img src="resimler/2.jpg" alt="Lahmacun">
                <h3>Lahmacun</h3>
                <p>100 TL</p>
                <button class="sepete-ekle" data-isim="Lahmacun" data-fiyat="100">Sepete Ekle</button>
            </section>

            <section class="urun-karti">
                <img src="resimler/7.jpg" alt="Pizza">
                <h3>Pizza</h3>
                <p>150 TL</p>
                <button class="sepete-ekle" data-isim="Pizza" data-fiyat="150">Sepete Ekle</button>
            </section>

            <section class="urun-karti">
                <img src="resimler/6.jpg" alt="Adana Kebabı">
                <h3>Adana Kebabı</h3>
                <p>120 TL</p>
                <button class="sepete-ekle" data-isim="Adana Kebabı" data-fiyat="120">Sepete Ekle</button>
            </section>

        </main>

    </div>

    <script src="js/myscript.js"></script>
</body>

</html>
